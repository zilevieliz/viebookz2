<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray-1: #f5f5f5;
      --gray-2: #e8e8e8;
      --gray-3: #a0a0a0;
      --gray-4: #606060;
      --border: #e2e2e2;
    }

    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--white);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo {
      font-family: 'EB Garamond', serif;
      font-size: 20px;
      color: var(--black);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .header-link {
      font-size: 12px;
      color: var(--gray-3);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .header-link:hover { color: var(--black); }

    /* HERO */
    .hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 100px 48px 80px;
      border-bottom: 1px solid var(--border);
    }
    .hero-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-3);
      margin-bottom: 24px;
    }
    .hero-title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(44px, 8vw, 80px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--black);
      margin-bottom: 24px;
    }
    .hero-desc {
      font-size: 16px;
      color: var(--gray-4);
      line-height: 1.7;
      max-width: 480px;
    }
    .hero-count {
      margin-top: 40px;
      font-size: 12px;
      color: var(--gray-3);
      letter-spacing: 0.06em;
    }

    /* CHAPTER LIST */
    .chapters {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }
    .chapters-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray-3);
      padding: 48px 0 24px;
      border-bottom: 1px solid var(--border);
    }
    .chapter-row {
      display: flex;
      align-items: baseline;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: padding-left 0.2s ease;
      text-decoration: none;
      color: inherit;
    }
    .chapter-row:hover { padding-left: 12px; }
    .chapter-row:hover .ch-arrow { opacity: 1; transform: translateX(0); }
    .ch-num {
      font-family: 'EB Garamond', serif;
      font-size: 13px;
      color: var(--gray-3);
      min-width: 32px;
    }
    .ch-info { flex: 1; }
    .ch-title {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .ch-words { font-size: 12px; color: var(--gray-3); }
    .ch-arrow {
      font-size: 18px;
      color: var(--gray-3);
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.2s ease;
    }

    .empty {
      padding: 80px 0;
      text-align: center;
      color: var(--gray-3);
      font-size: 15px;
    }

    /* LOADING */
    .loading {
      padding: 80px 0;
      text-align: center;
      color: var(--gray-3);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      animation: dots 1.2s steps(3,end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* READING VIEW */
    #reading-view { display: none; }
    .reading-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 48px 120px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
      margin-bottom: 60px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--black); }
    .reading-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray-3);
      margin-bottom: 16px;
    }
    .reading-title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 56px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }
    .reading-body {
      font-family: 'EB Garamond', serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.85;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    @media (max-width: 600px) {
      header { padding: 0 24px; }
      .hero, .chapters { padding-left: 24px; padding-right: 24px; }
      .reading-wrap { padding: 40px 24px 80px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">My Book</a>
  <a class="header-link" href="admin.html">Writer</a>
</header>

<!-- LIBRARY -->
<div id="library-view">
  <div class="hero">
    <p class="hero-label">Now Reading</p>
    <h1 class="hero-title">My Book</h1>
    <p class="hero-desc">A work in progress. Published chapters appear below as they are released.</p>
    <p class="hero-count" id="hero-count"></p>
  </div>

  <div class="chapters">
    <p class="chapters-label">Chapters</p>
    <div id="chapter-list"><div class="loading">Loading</div></div>
  </div>
</div>

<!-- READING -->
<div id="reading-view">
  <div class="reading-wrap">
    <button class="back-btn" onclick="closeChapter()">← Library</button>
    <p class="reading-label" id="reading-label">Chapter —</p>
    <h1 class="reading-title" id="reading-title"></h1>
    <div class="reading-body" id="reading-body"></div>
  </div>
</div>

<script>
let chapters = [];

async function loadChapters() {
  try {
    const res = await fetch('/api/chapters');
    const data = await res.json();
    if (data.success) {
      chapters = data.chapters;
      renderLibrary();
    } else {
      document.getElementById('chapter-list').innerHTML = '<p class="empty">Could not load chapters.</p>';
    }
  } catch {
    document.getElementById('chapter-list').innerHTML = '<p class="empty">Could not connect to server.</p>';
  }
}

function renderLibrary() {
  const count = document.getElementById('hero-count');
  count.textContent = chapters.length
    ? chapters.length + ' chapter' + (chapters.length > 1 ? 's' : '') + ' published'
    : '';

  const list = document.getElementById('chapter-list');
  if (!chapters.length) {
    list.innerHTML = '<p class="empty">No chapters published yet. Check back soon.</p>';
    return;
  }

  list.innerHTML = chapters.map((ch, i) => `
    <div class="chapter-row" onclick="openChapter('${ch.id}')">
      <span class="ch-num">${String(i + 1).padStart(2, '0')}</span>
      <div class="ch-info">
        <div class="ch-title">${esc(ch.title || 'Untitled')}</div>
        <div class="ch-words">${wordCount(ch.body)}</div>
      </div>
      <span class="ch-arrow">→</span>
    </div>
  `).join('');
}

function openChapter(id) {
  const ch = chapters.find(c => c.id === id);
  if (!ch) return;
  const idx = chapters.indexOf(ch);

  document.getElementById('reading-label').textContent = 'Chapter ' + String(idx + 1).padStart(2, '0');
  document.getElementById('reading-title').textContent = ch.title || 'Untitled';
  document.getElementById('reading-body').textContent  = ch.body  || '';

  document.getElementById('library-view').style.display = 'none';
  document.getElementById('reading-view').style.display  = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeChapter() {
  document.getElementById('library-view').style.display = 'block';
  document.getElementById('reading-view').style.display  = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function wordCount(t) {
  if (!t) return '0 words';
  return t.trim().split(/\s+/).filter(Boolean).length.toLocaleString() + ' words';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadChapters();
</script>
</body>
</html>
